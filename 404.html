<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Paranoid & Ready</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --red: #e02020;
    --text: #ffffff;
    --text-muted: #b0b0b0;
    --text-dim: #787878;
    --border-subtle: #1a1a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  a { color: inherit; text-decoration: none; }

  nav {
    padding: 28px 24px 0;
  }

  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--red);
  }

  .logo-and {
    color: #ffffff;
  }

  .header-line {
    max-width: 1100px;
    margin: 20px auto 0;
    padding: 0 24px;
  }

  .header-line hr {
    border: none;
    height: 1px;
    background: var(--red);
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    text-align: center;
  }

  .error-code {
    font-family: 'Space Mono', monospace;
    font-size: clamp(72px, 15vw, 160px);
    font-weight: 700;
    color: var(--red);
    line-height: 1;
    letter-spacing: -4px;
  }

  .error-title {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 16px;
  }

  .error-desc {
    font-size: 16px;
    color: var(--text-dim);
    margin-top: 12px;
    max-width: 400px;
  }

  .back-link {
    display: inline-block;
    margin-top: 40px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
    border: 1px solid var(--red);
    padding: 12px 32px;
    transition: background 0.2s, color 0.2s;
  }

  .back-link:hover {
    background: var(--red);
    color: #fff;
  }

  footer {
    padding: 40px 24px;
    text-align: center;
  }

  .footer-disclaimer {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo">PARANOID<span class="logo-and">AND</span>READY</a>
  </div>
</nav>

<div class="header-line"><hr></div>

<div class="content">
  <div class="error-code">404</div>
  <div class="error-title">Page not found</div>
  <div class="error-desc">This page doesn't exist — or it bugged out before things got serious.</div>
  <a href="/" class="back-link">← Back to base</a>
</div>

<footer>
  <div class="footer-disclaimer">As an Amazon Associate, paranoidandready.com earns from qualifying purchases. © 2025</div>
</footer>

</body>
</html>
