# PARANOIDANDREADY — Netlify Configuration
# Static site, no build command needed

[build]
  publish = "."

# ── Redirects ──────────────────────────────────────────────
# Old filenames from earlier uploads → proper pages
[[redirects]]
  from = "/paranoidandreadynew.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/paranoidandreadynew*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/paranoidandready*"
  to = "/"
  status = 301
  force = true

# ── Headers ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
