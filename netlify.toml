# PARANOIDANDREADY — Netlify Configuration
# Static site, no build command needed

[build]
  publish = "."

# ── Redirects ──────────────────────────────────────────────
# Old landing page filename → root
[[redirects]]
  from = "/paranoidandreadynew.html"
  to = "/"
  status = 301
  force = true

# Clean URLs (optional): /energy-power → /energy-power.html
[[redirects]]
  from = "/energy-power"
  to = "/energy-power.html"
  status = 200

[[redirects]]
  from = "/water-hydration"
  to = "/water-hydration.html"
  status = 200

[[redirects]]
  from = "/food-supply"
  to = "/food-supply.html"
  status = 200

[[redirects]]
  from = "/medical-hygiene"
  to = "/medical-hygiene.html"
  status = 200

[[redirects]]
  from = "/communication-navigation"
  to = "/communication-navigation.html"
  status = 200

[[redirects]]
  from = "/security-defense"
  to = "/security-defense.html"
  status = 200

[[redirects]]
  from = "/survival-repair"
  to = "/survival-repair.html"
  status = 200

# ── Headers ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
